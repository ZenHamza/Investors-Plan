<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Investor Return Pathways | Crypto Dev Funding</title>
    <!-- Tailwind CSS v3 + Font Awesome (optional icons) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM & Babel -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <!-- Custom tailwind config override (optional) -->
    <style>
        /* No watermark – clean */
        body {
            background: linear-gradient(145deg, #f0f4f8 0%, #e2e8f0 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        /* custom slide transition animations */
        .slide-enter {
            transform: translateX(100%);
            opacity: 0;
        }
        .slide-enter-active {
            transform: translateX(0%);
            opacity: 1;
            transition: transform 400ms ease-out, opacity 350ms ease-out;
        }
        .slide-exit {
            transform: translateX(0%);
            opacity: 1;
        }
        .slide-exit-active {
            transform: translateX(-100%);
            opacity: 0;
            transition: transform 400ms ease-in, opacity 350ms ease-in;
        }
        /* simple fade for background smoothness */
        .transition-bg {
            transition: background-color 0.2s;
        }
        /* custom scrollbar none for clean look */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2f6;
        }
        ::-webkit-scrollbar-thumb {
            background: #f7931a;
            border-radius: 12px;
        }
    </style>
</head>
<body class="antialiased flex items-center justify-center min-h-screen p-4 md:p-6">

<div id="root" class="w-full max-w-6xl mx-auto"></div>

<script type="text/babel">
    // SLIDES DATA – each slide represents a page with content
    const slides = [
        { // Slide 0 – Title + intro
            title: "💰 Investor Return Pathways",
            subtitle: "How development investors earn back capital (not token buyers)",
            content: ( ) => (
                <div className="text-center space-y-6">
                    <div className="inline-block p-4 bg-orange-100 rounded-full">
                        <span className="text-5xl">📈</span>
                    </div>
                    <h2 className="text-4xl md:text-5xl font-extrabold bg-gradient-to-r from-orange-600 to-amber-700 bg-clip-text text-transparent">Real‑Yield Model</h2>
                    <p className="text-gray-700 text-lg max-w-2xl mx-auto">10+ revenue channels — ad revenue, micro‑fees, swap fees, partnerships & royalties.<br/>No speculation required.</p>
                    <div className="flex justify-center gap-4 mt-6 text-sm text-gray-500">
                        <span>🎯 Telegram mining bot</span>
                        <span>⚡ Speed upgrades</span>
                        <span>🔄 Swap fees</span>
                    </div>
                </div>
            )
        },
        { // Slide 1 – Ad Revenue
            title: "📺 Ad Revenue",
            desc: "Telegram bot + mobile app – non‑intrusive banners & rewarded video",
            details: [
                "20% of net ad income to dev investors until 2x ROI → then 10% ongoing",
                "500k DAU → $1k–$2.5k daily ad income → investor monthly share $3k–$15k"
            ],
            highlight: "Monthly passive income"
        },
        { // Slide 2 – Presale / TGE dev fee
            title: "💰 Presale & TGE Dev Fee",
            desc: "Earn directly from capital raise – no token buying required",
            details: [
                "5% of total presale raise as development commission",
                "$2M presale → $100k to dev investor pool",
                "Or free allocation to flip after TGE"
            ],
            highlight: "One‑time lump sum"
        },
        { // Slide 3 – $2 dummy token
            title: "🎟️ $2 Dummy Token Fee",
            desc: "Users pay $2 for early badge / dummy token",
            details: [
                "100% of $2 fees → dev investors until full ROI, then 30%",
                "10,000 users × $2 = $20k direct to investors"
            ],
            highlight: "Fast upfront recovery"
        },
        { // Slide 4 – Double mining speed
            title: "⚡ Pay to Double Mining Speed",
            desc: "One‑time fee ($5–$20) inside Telegram bot",
            details: [
                "70% of fees to dev investors until 150% ROI, then 30%",
                "5,000 users × $10 = $50k → $35k for development fund"
            ],
            highlight: "High conversion, viral mechanic"
        },
        { // Slide 5 – Swap fees
            title: "🔄 Swap Transaction Fees",
            desc: "Built‑in ETH/BSC swap – 0.3% fee per trade",
            details: [
                "15% of all swap fees distributed monthly to dev investors",
                "$10M monthly volume → total fees $30k → investor share $4.5k/month"
            ],
            highlight: "Recurring DeFi yield"
        },
        { // Slide 6 – Premium staking entry
            title: "🏦 Premium Staking Entry Fees",
            desc: "Users pay $5 to access high‑APY pools",
            details: [
                "50% of entry fees go directly to dev investors",
                "20,000 stakers × $5 = $100k → $50k to investors"
            ],
            highlight: "Scalable with TVL growth"
        },
        { // Slide 7 – Partnership & listing fees
            title: "🤝 Partnership + CEX Listing Fees",
            desc: "Other projects pay for cross‑promos; exchanges pay listing fees",
            details: [
                "25% of all partnership/listing fees → dev investors",
                "Typical partnership: $2k–$10k; CEX listing: $50k–$200k"
            ],
            highlight: "High‑value one‑off deals"
        },
        { // Slide 8 – Ecosystem royalties (mobile app)
            title: "📱 Mobile App & Future Royalties",
            desc: "Roadmap includes mobile app, mini‑games, DeFi tools",
            details: [
                "Perpetual 5% royalty on net revenue from all future ecosystem products",
                "Recurring income independent of token price"
            ],
            highlight: "Long‑term upside"
        },
        { // Slide 9 – Investor referral program
            title: "👥 Investor Referral Commission",
            desc: "Development investors who bring new capital partners",
            details: [
                "10% one‑time commission on referred investment amount",
                "Refer $50k → earn $5k instantly"
            ],
            highlight: "Network effect bonus"
        },
        { // Slide 10 – LP rewards (optional)
            title: "💧 Liquidity Provision Rewards (Optional)",
            desc: "Provide initial DEX liquidity after TGE",
            details: [
                "Earn trading fees + farming rewards on Uniswap/PancakeSwap",
                "Double benefit: dev stake + LP yield"
            ],
            highlight: "Extra yield layer"
        },
        { // Slide 11 – Summary Table
            title: "📊 At a Glance – Revenue Channels",
            table: true,
            tableData: [
                ["Ad revenue", "10–20%", "Monthly"],
                ["Presale/TGE fee", "5% of raise", "One‑time"],
                ["$2 dummy token fees", "100% → 30% after ROI", "Daily/Weekly"],
                ["Double mining speed fees", "70% → 30% after 150% ROI", "Daily/Weekly"],
                ["Swap fees", "15% of swap fees", "Monthly"],
                ["Premium staking entry", "50%", "Weekly"],
                ["Partnership/listing fees", "25%", "Per deal"],
                ["Future royalties", "5% net revenue", "Monthly"],
                ["Referral commission", "10% of referred amount", "One‑time"]
            ]
        },
        { // Slide 12 – Risk & legal
            title: "🛡️ Risk Mitigation",
            content: () => (
                <div className="space-y-5">
                    <div className="grid md:grid-cols-2 gap-4">
                        <div className="bg-white/60 p-4 rounded-xl shadow-sm">🔒 Smart contract audit before launch</div>
                        <div className="bg-white/60 p-4 rounded-xl shadow-sm">📊 Real‑time dashboard with transparent revenue streaming</div>
                        <div className="bg-white/60 p-4 rounded-xl shadow-sm">📜 Signed legal agreement + escrow protection</div>
                        <div className="bg-white/60 p-4 rounded-xl shadow-sm">⛓️ Milestone‑based payouts & liquidity lock</div>
                    </div>
                    <p className="text-gray-600 text-sm mt-4">Investor capital aligned with ecosystem health – anti‑dump & long‑term lock mechanisms.</p>
                </div>
            )
        },
        { // Slide 13 – Conclusion + Thanks from Zen Hamza
            title: "✅ Conclusion & Thanks",
            content: () => (
                <div className="text-center space-y-8">
                    <div className="bg-orange-50 p-6 rounded-2xl">
                        <p className="text-xl font-semibold text-gray-800">Why fund development, not just tokens?</p>
                        <p className="text-gray-700 mt-2 max-w-xl mx-auto">Diversified real‑yield streams (ads, micro‑fees, swap fees, partnerships) → faster, predictable ROI + passive income after breakeven.</p>
                    </div>
                    <div className="border-t border-orange-200 pt-6">
                        <p className="text-2xl italic text-gray-700">“Thanks for reading so far — that concludes everything. Best regards,</p>
                        <p className="text-3xl font-bold bg-gradient-to-r from-orange-700 to-amber-800 bg-clip-text text-transparent mt-2">Zen Hamza”</p>
                        <div className="mt-8 text-sm text-gray-500">Ready to discuss term sheet? → Contact core team.</div>
                    </div>
                </div>
            )
        }
    ];

    // Slide component with animations
    const SlideDeck = () => {
        const [current, setCurrent] = React.useState(0);
        const [direction, setDirection] = React.useState('next'); // not used heavily but could
        const [animating, setAnimating] = React.useState(false);

        const total = slides.length;
        const goNext = () => {
            if (animating) return;
            if (current < total - 1) {
                setDirection('next');
                setAnimating(true);
                setCurrent(current + 1);
                setTimeout(() => setAnimating(false), 400);
            }
        };
        const goPrev = () => {
            if (animating) return;
            if (current > 0) {
                setDirection('prev');
                setAnimating(true);
                setCurrent(current - 1);
                setTimeout(() => setAnimating(false), 400);
            }
        };

        React.useEffect(() => {
            const handleKey = (e) => {
                if (e.key === 'ArrowRight') goNext();
                if (e.key === 'ArrowLeft') goPrev();
            };
            window.addEventListener('keydown', handleKey);
            return () => window.removeEventListener('keydown', handleKey);
        }, [current, animating]);

        const slide = slides[current];
        
        const renderContent = () => {
            if (slide.content) return slide.content();
            if (slide.table) {
                return (
                    <div className="overflow-x-auto">
                        <table className="min-w-full bg-white/70 rounded-xl shadow-sm border-separate border-spacing-0 overflow-hidden rounded-lg">
                            <thead className="bg-orange-600 text-white">
                                <tr>
                                    <th className="px-5 py-3 text-left">Revenue Source</th>
                                    <th className="px-5 py-3 text-left">Investor Share</th>
                                    <th className="px-5 py-3 text-left">Frequency</th>
                                </tr>
                            </thead>
                            <tbody>
                                {slide.tableData.map((row, idx) => (
                                    <tr key={idx} className="border-b border-gray-200 even:bg-gray-50">
                                        {row.map((cell, i) => <td key={i} className="px-5 py-3 text-gray-700">{cell}</td>)}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                );
            }
            // Standard slide with title, desc, details
            return (
                <div className="space-y-5">
                    <p className="text-lg text-orange-700 font-medium">{slide.desc}</p>
                    <ul className="space-y-3 list-disc list-inside text-gray-700">
                        {slide.details?.map((item, idx) => <li key={idx}>{item}</li>)}
                    </ul>
                    <div className="mt-6 inline-block bg-orange-100 text-orange-800 px-4 py-2 rounded-full text-sm font-semibold">
                        ✨ {slide.highlight}
                    </div>
                </div>
            );
        };

        return (
            <div className="relative bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl overflow-hidden border border-gray-200">
                {/* progress bar */}
                <div className="h-1.5 bg-gray-200 w-full">
                    <div className="h-1.5 bg-orange-500 transition-all duration-300" style={{ width: `${((current+1)/total)*100}%` }}></div>
                </div>
                
                {/* slide container with transition */}
                <div className="p-6 md:p-10 min-h-[550px] flex flex-col transition-all">
                    <div className="flex justify-between items-center mb-3">
                        <span className="text-xs font-mono text-gray-400 bg-gray-100 px-3 py-1 rounded-full">{current+1} / {total}</span>
                        {slide.title && <span className="text-xs text-gray-400">swipe ◀  ▶</span>}
                    </div>
                    
                    <div className="flex-1 transition-all duration-300 ease-out transform">
                        {slide.title && <h2 className="text-3xl md:text-4xl font-bold text-gray-800 border-l-4 border-orange-500 pl-4 mb-6">{slide.title}</h2>}
                        <div className="animate-fade-in" key={current} style={{ animation: 'fadeSlide 0.35s ease-out' }}>
                            {renderContent()}
                        </div>
                    </div>
                    
                    {/* navigation buttons */}
                    <div className="flex justify-between mt-8 pt-4 border-t border-gray-200">
                        <button onClick={goPrev} disabled={current === 0} className={`px-5 py-2 rounded-full font-medium transition ${current === 0 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gray-800 text-white hover:bg-gray-900 shadow-md'}`}>← Previous</button>
                        {current === total-1 ? (
                            <button onClick={() => alert("Presentation completed. Thanks!")} className="px-5 py-2 bg-orange-600 text-white rounded-full hover:bg-orange-700 shadow-md">🏁 Finish</button>
                        ) : (
                            <button onClick={goNext} className="px-5 py-2 bg-orange-600 text-white rounded-full hover:bg-orange-700 shadow-md">Next →</button>
                        )}
                    </div>
                </div>
                <div className="text-center text-[11px] text-gray-400 pb-3">no watermark • full transparency for development investors</div>
            </div>
        );
    };

    // small keyframe for fade in addition to slide
    const styleSheet = document.createElement("style");
    styleSheet.textContent = `
        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateX(8px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        .animate-fade-in {
            animation: fadeSlide 0.3s ease-out forwards;
        }
    `;
    document.head.appendChild(styleSheet);

    ReactDOM.createRoot(document.getElementById("root")).render(<SlideDeck />);
</script>
</body>
</html>
